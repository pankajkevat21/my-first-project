<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Signup Page</title>

    <link rel="stylesheet" href="signup.css">

</head>

<body>

    <div class="signup-box">

        <h1>Create Account</h1>

        <form 
            action="signup.php"
            method="POST"
            onsubmit="loginSuccess()"
        >

            <div class="input-box">

                <input 
                    type="text"
                    name="username"
                    placeholder="Enter Your Name"
                    required
                >

            </div>

            <div class="input-box">

                <input 
                    type="email"
                    name="email"
                    placeholder="Enter Your Email"
                    required
                >

            </div>

            <div class="input-box">

                <input 
                    type="password"
                    name="password"
                    placeholder="Create Password"
                    required
                >

            </div>

            <button type="submit"
            class="signup-btn">

                Signup

            </button>

            <p style="margin-top:20px; color:white;">

                Already have an Account?

                <a href="login.html">
                    Login
                </a>

            </p>

        </form>

    </div>

<script>

function loginSuccess(){

    localStorage.setItem("loggedIn","true");

}

</script>

</body>
</html>
