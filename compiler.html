<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java Compiler</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#0f172a;
    color:white;
    font-family:Arial;
}

.container{
    max-width:1000px;
    margin:auto;
    background:#1e293b;
    padding:20px;
    border-radius:20px;
}

textarea{
    width:100%;
    height:350px;
    background:black;
    color:#00ff88;
    border:none;
    outline:none;
    padding:15px;
    border-radius:10px;
    font-size:15px;
    resize:none;
}

button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.output{
    margin-top:20px;
    background:black;
    padding:15px;
    border-radius:10px;
    min-height:200px;
    white-space:pre-wrap;
}

</style>
</head>
<body>

<div class="container">

<h1>☕ Java Compiler</h1>

<textarea id="code">
public class Main {
    public static void main(String[] args) {

        System.out.println("Hello Pankaj!");

    }
}
</textarea>

<button onclick="runCode()">Run Code</button>

<div class="output" id="output">
Output will appear here...
</div>

</div>

<script>

async function runCode(){

    const code = document.getElementById("code").value;

    const output = document.getElementById("output");

    output.innerHTML = "Compiling...";

    try{

        const response = await fetch("https://emkc.org/api/v2/piston/execute", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({

                language: "java",

                version: "18.15.0",

                files: [
                    {
                        name: "Main.java",
                        content: code
                    }
                ]

            })

        });

        const data = await response.json();

        console.log(data);

        if(data.run){

            output.innerHTML = data.run.output;

        }else{

            output.innerHTML = JSON.stringify(data, null, 2);

        }

    }

    catch(error){

        output.innerHTML = "Error: " + error.message;

    }

}

</script>

</body>
</html>
