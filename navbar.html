<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar</title>

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial;
    }

    nav{
      background-color: rgb(75, 155, 187);
      padding: 15px 40px;

      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo{
        /* border: 2px darkblue dashed; */
      color: rgb(34, 236, 212);
      font-size: 28px;
      font-weight: bold;
    }

    ul{
      display: flex;
      list-style: none;
      gap: 25px;
    }

    ul li a{
      color: rgb(138, 20, 112);
      text-decoration: none;
      font-size: 20px;
      transition: 0.1s;
    }

    ul li a:hover{
      color: rgb(255, 0, 81);
    }

  </style>
</head>
<body>

  <nav>

    <div class="logo">Pankaj</div>

    <ul>
      <li><a href="https://www.google.com">Google</a></li>
      <li><a href="https://www.instagram.com/pankaj.0421?igsh=ZjVud3F1NTd5dXFy">Instagram</a></li>
      <li><a href="#"></a></li>
      <li><a href="#">Contact</a></li>
    </ul>

  </nav>

</body>
</html>
