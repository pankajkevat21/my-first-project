<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(135deg,#0f172a,#1e293b);
        }

        .forgot-box{
            width:350px;
            padding:40px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(15px);

            border-radius:20px;

            border:1px solid rgba(255,255,255,0.1);

            text-align:center;

            box-shadow:0 8px 32px rgba(0,0,0,0.3);
        }

        h1{
            color:white;
            margin-bottom:30px;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box input{
            width:100%;
            padding:14px;

            border:none;
            outline:none;

            border-radius:12px;

            background:rgba(255,255,255,0.1);

            color:white;

            font-size:16px;
        }

        .input-box input::placeholder{
            color:#ddd;
        }

        button{
            width:100%;
            padding:14px;

            border:none;

            border-radius:30px;

            background:linear-gradient(45deg,#38bdf8,#0ea5e9);

            color:white;

            font-size:18px;

            cursor:pointer;
        }

        a{
            color:#38bdf8;
            text-decoration:none;
        }

        p{
            margin-top:20px;
            color:white;
        }

    </style>

</head>
<body>

    <div class="forgot-box">

        <h1>Reset Password</h1>

        <form action="forgot.php" method="POST">

            <div class="input-box">
                <input 
                    type="email"
                    name="email"
                    placeholder="Enter Your Email"
                    required
                >
            </div>

            <div class="input-box">
                <input 
                    type="password"
                    name="newpassword"
                    placeholder="Enter New Password"
                    required
                >
            </div>

            <button type="submit">
                Reset Password
            </button>

        </form>

        <p>
            Back to <a href="login.html">Login</a>
        </p>

    </div>

</body>
</html>
