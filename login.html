<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Login Page</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(135deg,#0f172a,#1e293b);
        }

        .login-box{
            width:350px;
            padding:40px;

            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(15px);

            border-radius:20px;
            border:1px solid rgba(255,255,255,0.1);

            box-shadow:0 8px 32px rgba(0,0,0,0.3);

            text-align:center;
        }

        .login-box h1{
            color:white;
            margin-bottom:30px;
            font-size:35px;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box input{
            width:100%;
            padding:14px;

            border:none;
            outline:none;

            border-radius:12px;

            background:rgba(255,255,255,0.1);
            color:white;
            font-size:16px;
        }

        .input-box input::placeholder{
            color:#ddd;
        }

        button{
            width:100%;
            padding:14px;

            border:none;
            border-radius:30px;

            background:linear-gradient(45deg,#38bdf8,#0ea5e9);

            color:white;
            font-size:18px;
            font-weight:bold;

            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.05);
            box-shadow:0 0 20px rgba(56,189,248,0.8);
        }

        .extra{
            margin-top:20px;
            color:white;
            font-size:14px;
        }

        .extra a{
            color:#38bdf8;
            text-decoration:none;
        }

        .forgot{
            margin-top:15px;
        }

        .forgot a{
            color:#38bdf8;
            text-decoration:none;
            font-size:14px;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h1>Login</h1>

        <form 
            action="login.php"
            method="POST"
            onsubmit="loginSuccess()"
        >

            <div class="input-box">

                <input 
                    type="email" 
                    name="email"
                    placeholder="Enter Email"
                    required
                >

            </div>

            <div class="input-box">

                <input 
                    type="password" 
                    name="password"
                    placeholder="Enter Password"
                    required
                >

            </div>

            <button type="submit">
                Login
            </button>

        </form>

        <div class="forgot">

            <a href="forgot.html">
                Forgot Password?
            </a>

        </div>

        <div class="extra">

            <p>
                Don't have an account? 
                <a href="signup.html">
                    Register
                </a>
            </p>

        </div>

    </div>

    <script>

function loginSuccess(){

    localStorage.setItem("loggedIn","true");

}

</script>

</body>
</html>
